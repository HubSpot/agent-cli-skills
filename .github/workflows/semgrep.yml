  pull_request:
  push:
    branches: [main, master]
jobs:
  semgrep:
    uses: HubSpotEngineering/github-actions-cloud/.github/workflows/semgrep.yml@master
    secrets: inherit
    permissions:
      actions: read
      contents: read
      security-events: write
