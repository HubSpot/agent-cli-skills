name: CodeQL
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, master]
jobs:
  codeql:
    uses: HubSpotEngineering/github-actions-cloud/.github/workflows/codeql.yml@master
    secrets: inherit
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
